---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-backend
  namespace: chatbot
  labels:
    app: chatbot-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-backend
  template:
    metadata:
      labels:
        app: chatbot-backend
    spec:
      containers:
        - name: backend
          image: chatbot-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_BASE_URL
              value: "__OLLAMA_BASE_URL__"
            - name: OLLAMA_MODEL
              value: "__OLLAMA_MODEL__"
            - name: OLLAMA_NUM_GPU
              value: "0"
            - name: OLLAMA_TEMPERATURE
              value: "0.35"
            - name: OLLAMA_TOP_P
              value: "0.92"
            - name: OLLAMA_NUM_PREDICT
              value: "384"
            - name: CHATBOT_SYSTEM_PROMPT
              value: "You are a helpful assistant. Provide clear, practical answers with enough detail to be useful. Prefer concise structure (short paragraphs or bullets) instead of rambling. Do not output internal reasoning or self-talk. If the user asks for a short or exact reply, comply exactly."
            - name: IDENTITY_BASE_URL
              value: "http://identity-api.global-identity.svc.cluster.local:80"
            - name: CHATBOT_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: chatbot-secret
                  key: mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chatbot-secret
                  key: jwt-secret
            - name: JWT_AUDIENCE
              value: "global-apps"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-backend
  namespace: chatbot
spec:
  selector:
    app: chatbot-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
