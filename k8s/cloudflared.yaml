---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-cloudflared
  namespace: chatbot
  labels:
    app: chatbot-cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-cloudflared
  template:
    metadata:
      labels:
        app: chatbot-cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          imagePullPolicy: Always
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(CLOUDFLARE_TUNNEL_TOKEN)
            - --url
            - http://chatbot-frontend.chatbot.svc.cluster.local:80
          env:
            - name: CLOUDFLARE_TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-credentials
                  key: token
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
