apiVersion: v1
kind: Secret
metadata:
  name: identity-auth-secrets
  namespace: identity
type: Opaque
stringData:
  JWT_SECRET: identity-jwt-change-me
  JWT_ALGORITHM: HS256
  ACCESS_TTL_MINUTES: "15"
  REFRESH_TTL_DAYS: "30"
  MONGO_DB_NAME: identity
  MONGO_URI: mongodb://identity:identity-change-me@mongodb.identity.svc.cluster.local:27017/identity?authSource=admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: identity
  labels:
    app: identity-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-api
  template:
    metadata:
      labels:
        app: identity-api
    spec:
      containers:
        - name: identity-api
          image: chatbot-identity:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: identity-auth-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: identity-api
  namespace: identity
spec:
  selector:
    app: identity-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
