server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the FastAPI backend service
    location /api/ {
        proxy_pass http://chatbot-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';

        # Required for Server-Sent Events (streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # Proxy identity/auth requests to centralized identity service
    location /identity/ {
        proxy_pass http://identity-api.identity.svc.cluster.local:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # React SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
